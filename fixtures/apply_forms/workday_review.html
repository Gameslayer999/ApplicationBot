<!doctype html>
<!-- A Workday Review page for tests/test_workday.py to exercise _attempt_workday_submit's safety
     gates (M3, decision 064) directly: an armed submit shows a confirmation; an unmet required
     field is detectable pre-click; the SafetyGate (kill/unarmed/cap) blocks before the click. -->
<html>
<head><meta charset="utf-8"><title>Review</title></head>
<body>
  <h2>Review</h2>
  <p data-automation-id="reviewSummary">Please review before submitting.</p>

  <!-- a required field; starts EMPTY. A test fills it for the happy path, leaves it for the block. -->
  <div data-automation-id="requiredAck" aria-required="true"><label>Confirm accuracy</label><input type="text"></div>

  <button data-automation-id="pageFooterSubmitButton" type="button">Submit</button>

  <script>
    window.__submitted = false;
    document.querySelector("[data-automation-id=pageFooterSubmitButton]").onclick = () => {
      window.__submitted = true;
      const c = document.createElement("div");
      c.textContent = "Thank you for applying. Your application was submitted.";
      document.body.appendChild(c);
    };
  </script>
</body>
</html>
