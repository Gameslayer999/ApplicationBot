  expect: null

# ITAR / export-control gates → Yes for a U.S. citizen (a citizen is a "U.S. person");
# clearance ELIGIBILITY → Yes, but HAVING a clearance stays captured (pinned null above).
- label: Are you a U.S. Person as defined by ITAR?
  expect: 'Yes'
  hints:
  - U.S. citizen or national
  - U.S. citizen
  - US citizen
  - U.S. Person
  - US Person
  - 'Yes'
- label: 'ITAR REQUIREMENTS: To conform to U.S. Government export regulations, applicant must be a (i) U.S. citizen or national, (ii) U.S. lawful, permanent resident (aka green card holder), (iii) Refugee under 8 U.S.C. 1157, or (iv) Asylee under 8 U.S.C. 1158, or be eligible to obtain the required authorizations from the U.S. Department of State. Do you meet these requirements?'
  expect: 'Yes'
- label: Do you meet the ITAR requirements described above?
  expect: 'Yes'
- label: Are you eligible to obtain a U.S. government security clearance?
  expect: 'Yes'
