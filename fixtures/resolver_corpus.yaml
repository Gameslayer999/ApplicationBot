# Resolver regression corpus — pins AnswerResolver.resolve() + option_hints() behavior.
#
# Labels collected from REAL application forms driven in live dry-run sweeps (SpaceX, Stripe,
# Robinhood, Instacart, GitLab, Discord, Ramp, cin7 — see NEXT_STEPS.md session notes), resolved
# against examples/sample_resume.yaml + the synthetic profile in tests/test_resolver_corpus.py.
# No real applicant data (Guideline #12).
#
# Every entry is VERIFIED-CORRECT behavior, not merely observed output. If a resolver change
# flips one of these answers, the change is wrong (or this file must be deliberately updated
# in the same commit, with the reasoning in the commit message).
#
#   expect: null   means the resolver must leave the field for the user (captured), never guess.
#   hints:         when present, option_hints(label) must return exactly this list.
#   company:/pay:  optional resolver context (hiring company; advertised pay band).
